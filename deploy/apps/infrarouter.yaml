apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrarouter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SirXavor/InfraRouter.git
    targetRevision: main
    path: deploy/infrarouter
  destination:
    server: https://kubernetes.default.svc
    namespace: infrarouter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
