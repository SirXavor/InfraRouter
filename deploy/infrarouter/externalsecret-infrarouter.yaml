apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: infrarouter-secret
  namespace: infrarouter
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: infrarouter-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: app/infrarouter
        property: DATABASE_URL
