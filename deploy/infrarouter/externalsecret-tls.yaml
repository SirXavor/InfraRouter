apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-wildcard-tls
  namespace: infrarouter
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: hermes-wildcard-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: certs/hermes-wildcard-tls
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: certs/hermes-wildcard-tls
        property: tls.key
