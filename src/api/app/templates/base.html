<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InfraRouter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; background: #f1f5f9; color: #0f172a; line-height: 1.5; }

    nav { background: #0f172a; display: flex; align-items: center; padding: 0 24px; height: 52px; gap: 0; }
    nav .brand { font-size: 15px; font-weight: 700; color: #f8fafc; text-decoration: none; margin-right: 28px; letter-spacing: -.2px; }
    nav a.nav-link { color: #94a3b8; text-decoration: none; padding: 0 14px; height: 52px; display: inline-flex; align-items: center; font-size: 13px; border-bottom: 2px solid transparent; position: relative; }
    nav a.nav-link:hover { color: #f1f5f9; }
    nav a.nav-link.active { color: #f1f5f9; border-bottom-color: #3b82f6; }
    .nav-badge { background: #ef4444; color: white; font-size: 10px; font-weight: 700; border-radius: 9999px; padding: 0 5px; min-width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; margin-left: 6px; }

    main { max-width: 1140px; margin: 32px auto; padding: 0 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }

    .card { background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 24px; }
    .card-header { padding: 14px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
    .card-header h2 { font-size: 14px; font-weight: 600; color: #374151; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #64748b; padding: 10px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    td { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbfe; }

    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-synced   { background: #dcfce7; color: #15803d; }
    .badge-pending  { background: #fef9c3; color: #92400e; }
    .badge-offline  { background: #fee2e2; color: #b91c1c; }
    .badge-na       { background: #f1f5f9; color: #64748b; }
    .badge-approved { background: #dbeafe; color: #1d4ed8; }
    .badge-revoked  { background: #f1f5f9; color: #6b7280; }
    .badge-rejected { background: #fee2e2; color: #b91c1c; }

    .btn { display: inline-flex; align-items: center; padding: 5px 12px; border-radius: 5px; border: 1px solid transparent; cursor: pointer; font-size: 12px; font-weight: 500; text-decoration: none; line-height: 1.5; background: none; }
    .btn:hover { filter: brightness(.92); }
    .btn-primary  { background: #3b82f6; color: #fff; }
    .btn-success  { background: #16a34a; color: #fff; }
    .btn-danger   { background: #dc2626; color: #fff; }
    .btn-ghost    { background: transparent; border-color: #e2e8f0; color: #475569; }
    .actions { display: flex; gap: 6px; align-items: center; }
    form.inline { display: inline; }

    .alert { padding: 10px 16px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; }
    .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; }
    .form-full { grid-column: 1 / -1; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #64748b; margin-bottom: 4px; }
    .form-group input[type=text] { width: 100%; padding: 7px 10px; border: 1px solid #e2e8f0; border-radius: 5px; font-size: 13px; background: #fff; }
    .form-group input[type=text]:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
    .hint { font-size: 11px; color: #94a3b8; margin-top: 3px; }
    .form-actions { padding: 14px 20px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }

    .muted { color: #94a3b8; font-size: 12px; }
    .mono  { font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px; }
    .empty { padding: 32px 20px; text-align: center; color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
<nav>
  <a href="/panel/" class="brand">InfraRouter</a>
  <a href="/panel/" class="nav-link {{ 'active' if active == 'devices' else '' }}">Devices</a>
  <a href="/panel/pending" class="nav-link {{ 'active' if active == 'pending' else '' }}">
    Pending
    {% if pending_count %}<span class="nav-badge">{{ pending_count }}</span>{% endif %}
  </a>
  <a href="/panel/global" class="nav-link {{ 'active' if active == 'global' else '' }}">Global Config</a>
</nav>
<main>
  {% if msg %}<div class="alert alert-success">{{ msg }}</div>{% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
